<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torn Cost Tracker</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/items.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="logo">
          <img class="logo-icon" src="assets/logo.png" alt="Torn Cost Tracker" />
          <div class="logo-text">
            <h2>Torn Cost Tracker</h2>
            <span id="version">Version loading...</span>
          </div>
        </div>

        <nav>
          <button class="nav-button active" data-page="dashboard" aria-label="Dashboard" title="Dashboard">
            <span class="nav-icon"><img src="assets/dashboard.png" alt="" /></span>
            <span class="nav-text">Dashboard</span>
          </button>
          <button class="nav-button" data-page="items" aria-label="Items" title="Items">
            <span class="nav-icon"><img src="assets/items.png" alt="" /></span>
            <span class="nav-text">Items</span>
          </button>
          <button class="nav-button" data-page="purchases" aria-label="Purchases" title="Purchases">
            <span class="nav-icon"><img src="assets/purchases.png" alt="" /></span>
            <span class="nav-text">Purchases</span>
          </button>
          <button class="nav-button" data-page="conversions" aria-label="Conversion History" title="Conversion History">
            <span class="nav-icon" aria-hidden="true">↻</span>
            <span class="nav-text">Conversions</span>
          </button>
          <button class="nav-button" data-page="statistics" aria-label="Statistics" title="Statistics">
            <span class="nav-icon"><img src="assets/stats.png" alt="" /></span>
            <span class="nav-text">Statistics</span>
          </button>
          <button class="nav-button" data-page="readme" aria-label="Readme" title="Readme">
            <span class="nav-icon"><img src="assets/readme.png" alt="" /></span>
            <span class="nav-text">Readme</span>
          </button>
          <button class="nav-button" data-page="settings" aria-label="Settings" title="Settings">
            <span class="nav-icon"><img src="assets/settings.png" alt="" /></span>
            <span class="nav-text">Settings</span>
          </button>
        </nav>
      </aside>

      <main>
        <header id="topBar">
          <div class="header-left">
            <button id="sidebarToggle" type="button" aria-controls="sidebar" aria-expanded="true" aria-label="Collapse sidebar" title="Collapse sidebar">&#9776;</button>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="header-right">
            <div id="status">
              <span class="status-dot"></span>
              <span id="statusText"> Ready </span>
            </div>
          </div>
        </header>

        <section id="content"></section>
        <footer>
          <div>Torn Cost Tracker</div>
          <div id="footerVersion">Release loading...</div>
        </footer>
      </main>
    </div>

    <div id="toastContainer"></div>
    <div id="loadingOverlay" class="hidden">
      <div class="loading-box">
        <div class="spinner"></div>
        <h2 id="loadingTitle">Loading...</h2>
        <p id="loadingMessage">Please wait...</p>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
